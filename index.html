<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PlacePrep — Campus Placement Tracker</title>
  <meta name="description" content="Track your campus placement preparation progress with weekly goals, daily objectives, and color-coded calendar insights." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body>
  <div id="app">
    <!-- Login / Register View -->
    <div id="login-view" class="view">
      <div class="login-container">
        <div class="login-glow"></div>
        <div class="login-card">
          <div class="login-header">
            <div class="logo">
              <span class="logo-icon">🎯</span>
              <h1>PlacePrep</h1>
            </div>
            <p class="login-subtitle">Campus Placement Accountability Tracker</p>
          </div>

          <!-- Login Form -->
          <form id="login-form">
            <div class="input-group">
              <label for="username">Username</label>
              <input type="text" id="username" name="username" placeholder="Enter your username" required autocomplete="username" />
            </div>
            <div class="input-group">
              <label for="password">Password</label>
              <input type="password" id="password" name="password" placeholder="Enter your password" required autocomplete="current-password" />
            </div>
            <button type="submit" id="login-btn" class="btn-primary">
              <span>Sign In</span>
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
            </button>
            <div id="login-error" class="error-msg" style="display:none;"></div>
          </form>

          <!-- Register Form (hidden by default) -->
          <form id="register-form" style="display:none;">
            <div class="input-group">
              <label for="reg-display-name">Display Name</label>
              <input type="text" id="reg-display-name" placeholder="e.g., Naman" required />
            </div>
            <div class="input-group">
              <label for="reg-username">Username</label>
              <input type="text" id="reg-username" placeholder="Choose a username" required autocomplete="username" />
            </div>
            <div class="input-group">
              <label for="reg-password">Password</label>
              <input type="password" id="reg-password" placeholder="Choose a password" required autocomplete="new-password" />
            </div>
            <button type="submit" id="register-btn" class="btn-primary">
              <span>Create Account</span>
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="8.5" cy="7" r="4"/><line x1="20" y1="8" x2="20" y2="14"/><line x1="23" y1="11" x2="17" y2="11"/></svg>
            </button>
            <div id="register-error" class="error-msg" style="display:none;"></div>
          </form>

          <!-- Toggle between login and register -->
          <div class="auth-toggle">
            <span id="auth-toggle-text">Don't have an account?</span>
            <button type="button" id="auth-toggle-btn" class="btn-link">Create one</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Dashboard View -->
    <div id="dashboard-view" class="view" style="display:none;">
      <header class="topbar">
        <div class="topbar-left">
          <span class="logo-icon-sm">🎯</span>
          <span class="topbar-title">PlacePrep</span>
        </div>
        <div class="topbar-right">
          <button id="friends-nav-btn" class="btn-ghost friends-nav-btn">
            <span>👥 Friends</span>
            <span id="friend-req-badge" class="friend-req-badge" style="display:none;">0</span>
          </button>
          <span id="user-greeting" class="greeting"></span>
          <button id="logout-btn" class="btn-ghost">Logout</button>
        </div>
      </header>

      <main class="dashboard">
        <!-- Week Summary -->
        <section class="section" id="week-summary-section">
          <div class="section-header">
            <h2>📅 This Week's Goals</h2>
            <button id="add-goal-btn" class="btn-accent">+ New Goal</button>
          </div>
          <div id="week-nav" class="week-nav">
            <button id="prev-week" class="btn-icon">◀</button>
            <span id="week-label" class="week-label"></span>
            <button id="next-week" class="btn-icon">▶</button>
          </div>
          <div id="goals-list" class="goals-list"></div>
        </section>

        <!-- Friends Progress Section -->
        <section class="section" id="team-section">
          <div class="section-header">
            <h2>👥 Friends' Progress</h2>
          </div>
          <div id="team-progress" class="team-progress"></div>
        </section>

        <!-- Calendar Section -->
        <section class="section" id="calendar-section">
          <div class="section-header">
            <h2>📊 Monthly Progress</h2>
          </div>
          <div class="calendar-nav">
            <button id="prev-month" class="btn-icon">◀</button>
            <span id="month-label" class="month-label"></span>
            <button id="next-month" class="btn-icon">▶</button>
          </div>
          <div class="calendar-legend">
            <span class="legend-item"><span class="dot dot-green"></span> ≥75%</span>
            <span class="legend-item"><span class="dot dot-yellow"></span> 40–74%</span>
            <span class="legend-item"><span class="dot dot-red"></span> &lt;40%</span>
            <span class="legend-item"><span class="dot dot-gray"></span> No data</span>
          </div>
          <div id="calendar-grid" class="calendar-grid"></div>
        </section>
      </main>

      <!-- Goal Modal -->
      <div id="goal-modal" class="modal" style="display:none;">
        <div class="modal-overlay"></div>
        <div class="modal-content">
          <div class="modal-header">
            <h3>Create Goal</h3>
            <button id="close-goal-modal" class="btn-icon close-btn">✕</button>
          </div>
          <form id="goal-form">
            <div class="goal-type-toggle">
              <button type="button" class="type-btn active" data-type="weekly">📅 Weekly</button>
              <button type="button" class="type-btn" data-type="daily">📌 Daily</button>
            </div>
            <input type="hidden" id="goal-type" value="weekly" />
            <div class="input-group">
              <label for="goal-title">Goal Title</label>
              <input type="text" id="goal-title" placeholder="e.g., Solve LeetCode Problems" required />
            </div>
            <div class="input-group">
              <label for="goal-desc">Description (optional)</label>
              <textarea id="goal-desc" placeholder="Brief description..." rows="2"></textarea>
            </div>
            <div class="input-row">
              <div class="input-group">
                <label for="goal-target" id="target-label">Weekly Target</label>
                <input type="number" id="goal-target" placeholder="e.g., 21" min="1" required />
              </div>
              <div class="input-group">
                <label for="goal-unit">Unit</label>
                <input type="text" id="goal-unit" placeholder="e.g., problems" value="tasks" />
              </div>
            </div>
            <div class="daily-preview" id="daily-preview" style="display:none;">
              <span class="preview-label">Daily target:</span>
              <span id="daily-target-preview" class="preview-value"></span>
            </div>
            <div class="privacy-toggle-row">
              <label class="privacy-label">
                <input type="checkbox" id="goal-private-check" />
                <span class="privacy-check-icon">🔒</span>
                <span>Private goal <span class="privacy-hint">(hidden from friends)</span></span>
              </label>
            </div>
            <button type="submit" class="btn-primary">Create Goal</button>
          </form>
        </div>
      </div>

      <!-- Progress Modal -->
      <div id="progress-modal" class="modal" style="display:none;">
        <div class="modal-overlay"></div>
        <div class="modal-content">
          <div class="modal-header">
            <h3 id="progress-modal-title">Update Progress</h3>
            <button id="close-progress-modal" class="btn-icon close-btn">✕</button>
          </div>
          <div id="progress-entries"></div>
        </div>
      </div>

      <!-- Friends Modal -->
      <div id="friends-modal" class="modal" style="display:none;">
        <div class="modal-overlay"></div>
        <div class="modal-content friends-modal-content">
          <div class="modal-header">
            <h3>👥 Friends</h3>
            <button id="close-friends-modal" class="btn-icon close-btn">✕</button>
          </div>

          <!-- Tabs -->
          <div class="friends-tabs">
            <button class="friends-tab active" data-tab="search">Search</button>
            <button class="friends-tab" data-tab="requests">
              Requests
              <span id="tab-req-badge" class="tab-badge" style="display:none;">0</span>
            </button>
            <button class="friends-tab" data-tab="list">My Friends</button>
          </div>

          <!-- Search Tab -->
          <div id="friends-tab-search" class="friends-tab-content active">
            <div class="input-group" style="margin-bottom:1rem;">
              <input type="text" id="friend-search-input" placeholder="Search by username or name..." />
            </div>
            <div id="friend-search-results" class="friends-list"></div>
          </div>

          <!-- Requests Tab -->
          <div id="friends-tab-requests" class="friends-tab-content" style="display:none;">
            <div id="friend-requests-list" class="friends-list"></div>
          </div>

          <!-- My Friends Tab -->
          <div id="friends-tab-list" class="friends-tab-content" style="display:none;">
            <div id="friends-list" class="friends-list"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
